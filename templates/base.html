<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizora - AI Powered Learning</title>
    <!-- Google Fonts: Outfit & Inter for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    
    <div class="background-mesh">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">
                <i class="fa-solid fa-brain"></i> Quizora
            </a>
            
            <ul class="nav-links">
                {% if session.get('user_id') %}
                    <li><a href="{{ url_for('category') }}" class="nav-item"><i class="fa-solid fa-play"></i> Quiz</a></li>
                    <li><a href="{{ url_for('dashboard') }}" class="nav-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                    <li><a href="{{ url_for('logout') }}" class="nav-btn logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
                {% else %}
                    <li><a href="{{ url_for('login') }}" class="nav-item">Login</a></li>
                    <li><a href="{{ url_for('register') }}" class="nav-btn login-btn">Sign Up</a></li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="glass-container {% block container_class %}{% endblock %}">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <script>
        // Optional JS for micro-interactions can go here
    </script>
</body>
</html>
